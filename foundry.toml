[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
gas_reports = ["AgentRegistry", "JobEscrow"]

[profile.ci]
fuzz = { runs = 1024 }
invariant = { runs = 256 }

[rpc_endpoints]
arc_testnet = "${ARC_TESTNET_RPC_URL}"

[etherscan]
arc_testnet = { key = "${ARCSCAN_KEY}", url = "https://testnet.arcscan.app/api" }

[fmt]
line_length = 110
tab_width = 4
bracket_spacing = true
int_types = "long"
quote_style = "double"
number_underscore = "thousands"
